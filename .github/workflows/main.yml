name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Xcode
      - name: Set up Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app

      # Step 3: Build the iOS app using .xcodeproj
      - name: Build the app
        run: |
          xcodebuild clean build \
            -project Vivara.xcodeproj \
            -scheme Vivara \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 14' \
            CODE_SIGNING_ALLOWED=NO

      # Step 4: Archive the build (optional)
      - name: Archive the app
        run: |
          xcodebuild archive \
            -project Vivara.xcodeproj \
            -scheme Vivara \
            -archivePath $PWD/build/Vivara.xcarchive
