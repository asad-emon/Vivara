name: Build iOS `.ipa`

on:
  workflow_dispatch:

jobs:
  build:
    name: Archive and Export .ipa
    runs-on: macos-latest

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Xcode Environment
      - name: Set up Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app

      # Step 3: Install dependencies (if using CocoaPods)
      - name: Install CocoaPods
        run: |
          if [ -f "Podfile" ]; then
            sudo gem install cocoapods
            pod install
          fi

      # Step 4: Archive the App
      - name: Archive the App
        run: |
          xcodebuild clean archive \
            -workspace Vivara.xcworkspace \
            -scheme Vivara \
            -archivePath $PWD/build/Vivara.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      # Step 5: Export the IPA File
      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/Vivara.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist ExportOptions.plist

      # Step 6: Upload .ipa File
      - name: Upload .ipa File
        uses: actions/upload-artifact@v4 # Updated to v4
        with:
          name: Vivara.ipa
          path: build/*.ipa